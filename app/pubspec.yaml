name: musikr
description: "MusiKR — cross-platform symbolic music chart editor."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^15.1.2

  # Persistence (in-memory for Phase 1; real SQLite in Phase 2)
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.28

  # IDs
  uuid: ^4.5.1

  # Immutable models + sealed unions
  freezed_annotation: ^2.4.4

  # JSON serialisation (mappers layer)
  json_annotation: ^4.9.0

  # Collection utilities
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.9.3
  riverpod_generator: ^2.6.1
  drift_dev: ^2.23.1

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/

  fonts:
    - family: Petaluma
      fonts:
        - asset: assets/fonts/Petaluma.otf
    - family: PetalumaScript
      fonts:
        - asset: assets/fonts/PetalumaScript.otf
